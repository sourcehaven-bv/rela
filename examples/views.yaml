# Example views.yaml file
# Views define declarative graph traversals for context generation

views:
  # Example: Document publishing view
  # Generates complete context for a document with all related entities
  document_publish:
    description: "Complete context for document publishing"

    # Entry point - the entity to start from
    entry:
      type: document
      parameter: doc_id

    # Output configuration
    output:
      include_content: true           # Include entity and relation content
      resolve_relation_titles: true   # Resolve relation IDs to {id, title}
      include_entry: true              # Include the entry entity in output

    # Declarative traversal rules
    traverse:
      # Follow outgoing relations from the entry document
      - from: entry
        follow: describesBouwblok
        collect_as: bouwbloks

      # Follow incoming relations (reverse direction)
      - from: bouwbloks
        follow_incoming: partOfBouwblok
        collect_as: [functions, usecases]

      # Recursive traversal with depth limit
      - from: components
        follow: dependsOn
        recursive: true
        max_depth: 5
        collect_as: components

      # Collect from all gathered entities (using wildcard)
      - from: "*"
        follow: hasTheme
        collect_as: themes

      # Traverse with property filter
      - from: functions
        follow: hasRequirement
        where: "status=accepted"
        collect_as: requirements

    # Property-based filters
    filters:
      requirements:
        match_any:
          - via_traversal: true           # Reached via traverse rules
          - id_prefix: ["LRZA-", "GF-"]   # Or matches ID prefix

    # Derived/computed collections
    derived:
      # Group entities by property
      dataobjects_by_domain:
        source: dataobjects
        group_by: "properties.domain"

      # Filter subset
      open_issues:
        source: issues
        where: "status=open"

      # Embed related entities (future enhancement)
      # personas_with_functions:
      #   source: personas
      #   embed:
      #     - relation: usesFunction
      #       target: functions
      #       as: functions
      #       include: [id, title]

    # Export specific relation types as separate collection
    relation_exports:
      - types: [mapsTo, filters]
        between: [dataobjects, dataobjects]
        collect_as: dataobject_mappings

  # Example: Simple component dependencies view
  component_dependencies:
    description: "Transitive dependencies for a component"

    entry:
      type: component
      parameter: component_id

    output:
      include_content: false
      resolve_relation_titles: true

    traverse:
      - from: entry
        follow: dependsOn
        recursive: true
        max_depth: 10
        collect_as: dependencies

  # Example: Requirements traceability view
  requirement_trace:
    description: "Full traceability chain for a requirement"

    entry:
      type: requirement
      parameter: req_id

    output:
      include_content: true
      resolve_relation_titles: true

    traverse:
      # Find decisions addressing this requirement
      - from: entry
        follow_incoming: addresses
        collect_as: decisions

      # Find solutions implementing those decisions
      - from: decisions
        follow_incoming: implements
        collect_as: solutions

      # Find components realizing those solutions
      - from: solutions
        follow_incoming: realizes
        collect_as: components

    # Filter to only include accepted decisions
    filters:
      decisions:
        where: "status=accepted"
