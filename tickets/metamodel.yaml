  # ===================
  # CI Gates: No Partial Work
  # ===================
  # These rules prevent merging PRs with incomplete work.
  # Tickets/bugs must be either not started (backlog/ready) or fully complete (done/wont-fix).
  # --- Tickets in progress ---
  - name: ci-no-planning-tickets
    description: "CI: Tickets in 'planning' status cannot be merged - complete or revert"
    entity_type: ticket
    when:
      - "status=planning"
    then:
      - "status!=planning"
    severity: error
  - name: ci-no-in-progress-tickets
    description: "CI: Tickets in 'in-progress' status cannot be merged - complete or revert"
    entity_type: ticket
    when:
      - "status=in-progress"
    then:
      - "status!=in-progress"
    severity: error
  - name: ci-no-review-tickets
    description: "CI: Tickets in 'review' status cannot be merged - complete or revert"
    entity_type: ticket
    when:
      - "status=review"
    then:
      - "status!=review"
    severity: error
  - name: ci-no-blocked-tickets
    description: "CI: Tickets in 'blocked' status cannot be merged - resolve or revert"
    entity_type: ticket
    when:
      - "status=blocked"
    then:
      - "status!=blocked"
    severity: error
  # --- Bugs in progress ---
  - name: ci-no-analyzing-bugs
    description: "CI: Bugs in 'analyzing' status cannot be merged - complete or revert"
    entity_type: bug
    when:
      - "status=analyzing"
    then:
      - "status!=analyzing"
    severity: error
  - name: ci-no-in-progress-bugs
    description: "CI: Bugs in 'in-progress' status cannot be merged - complete or revert"
