# @managed: claude-workflow v1
# Metamodel for rela's own development
# Dogfooding: using rela to track architecture, features, tickets, QA, and docs

version: "1.0"
namespace: "https://rela.dev/ontology/development#"
types:
  # Lifecycle statuses
  concept_status:
    values: [draft, stable, deprecated]
    default: draft
  decision_status:
    values: [proposed, accepted, superseded, deprecated]
    default: proposed
  feature_status:
    values: [proposed, planned, in-progress, implemented, removed]
    default: proposed
  ticket_status:
    values: [backlog, ready, planning, in-progress, review, done, wont-fix, blocked]
    default: backlog
  bug_status:
    values: [backlog, ready, analyzing, in-progress, review, done, wont-fix, blocked]
    default: backlog
  checklist_status:
    values: [pending, in-progress, done]
    default: pending
  review_response_status:
    values: [open, addressed, wont-fix, deferred]
    default: open
  review_response_severity:
    values: [critical, significant, minor, nit]
    default: minor
  risk_status:
    values: [identified, mitigated, accepted, resolved]
    default: identified
  test_status:
    values: [draft, active, skipped, deprecated]
    default: active
  qa_result:
    values: [in-progress, passed, failed, blocked]
    default: in-progress
  doc_status:
    values: [stub, draft, review, published, outdated]
    default: stub
  # Enums
  priority:
    values: [critical, high, medium, low]
    default: medium
  layer:
    values: [core, cli, tui, server, infra]
  ticket_kind:
    values: [enhancement, refactor, docs, test, chore]
  effort:
    values: [xs, s, m, l, xl]
  likelihood:
    values: [low, medium, high]
  impact:
    values: [low, medium, high]
  test_kind:
    values: [unit, integration, e2e, manual, fuzz, property]
  automated_measure_kind:
    values: [test, lint, ci, type-check, monitoring]
  manual_measure_kind:
    values: [review, docs, process, checklist]
  measure_status:
    values: [proposed, active, deprecated]
    default: proposed
  doc_kind:
    values: [guide, reference, tutorial, howto, explanation, changelog]
  audience:
    values: [beginner, intermediate, advanced]
    default: beginner
  # Ideation statuses
  idea_status:
    values: [captured, exploring, validated, promoted, parked, rejected]
    default: captured
  idea_category:
    values: [feature, ux, integration, ai, visualization, performance, dx, architecture]
  idea_effort:
    values: [trivial, small, medium, large, epic]
  idea_value:
    values: [nice-to-have, useful, valuable, critical]
  ticket_tag:
    values: [good-first, needs-investigation, needs-design, tech-debt, regression, blocked-upstream]
entities:
  # ===================
  # Architecture
  # ===================
  concept:
    label: Concept
    id_type: manual
    color: "#E3F2FD"
    border_color: "#1976D2"
    properties:
      title:
        type: string
        required: true
      summary:
        type: string
        description: Brief explanation for documentation
      description:
        type: string
      package:
        type: string
        description: Go package location (e.g., internal/graph)
      layer:
        type: layer
      status:
        type: concept_status
        required: true
    default_sort:
      - property: layer
      - property: title
  # ===================
  # Ideation
  # ===================
  idea:
    label: Idea
    aliases: [brainstorm]
    id_prefix: "IDEA-"
    id_type: short
    color: "#F3E5F5"
    border_color: "#9C27B0"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
        description: What is the idea? What problem does it solve?
      category:
        type: idea_category
        description: What area does this idea relate to?
      inspiration:
        type: string
        description: Where did this idea come from? (tool, article, user feedback)
      effort:
        type: idea_effort
        description: Rough estimate of implementation effort
      value:
        type: idea_value
        description: Potential value if implemented
      notes:
        type: string
        description: Additional thoughts, considerations, or open questions
      status:
        type: idea_status
        required: true
    default_sort:
      - property: status
      - property: category
      - property: title
  future-concept:
    label: Future Concept
    aliases: [possibility, exploration]
    id_type: manual
    color: "#E1BEE7"
    border_color: "#7B1FA2"
    properties:
      title:
        type: string
        required: true
      summary:
        type: string
        description: Brief explanation of the concept
      description:
        type: string
        description: Detailed explanation of what this would involve
      rationale:
        type: string
        description: Why would this be valuable?
      challenges:
        type: string
        description: What makes this difficult or risky?
      prerequisites:
        type: string
        description: What needs to exist first?
      effort:
        type: idea_effort
      value:
        type: idea_value
      status:
        type: idea_status
        required: true
    default_sort:
      - property: status
      - property: value
        direction: desc
      - property: title
  decision:
    label: Decision
    aliases: [dec, adr]
    id_prefix: "DEC-"
    id_type: short
    color: "#FFF3E0"
    border_color: "#F57C00"
    properties:
      title:
        type: string
        required: true
      context:
        type: string
        description: Why this decision was needed
      consequences:
        type: string
        description: Implications of this decision
      date:
        type: date
      status:
        type: decision_status
        required: true
    default_sort:
      - property: date
        direction: desc
  # ===================
  # Planning
  # ===================
  feature:
    label: Feature
    id_prefix: "FEAT-"
    id_type: short
    color: "#E8F5E9"
    border_color: "#388E3C"
    properties:
      title:
        type: string
        required: true
      summary:
        type: string
        description: Brief explanation for documentation
      description:
        type: string
      priority:
        type: priority
      status:
        type: feature_status
        required: true
    default_sort:
      - property: priority
      - property: status
  bug:
    label: Bug
    aliases: [defect]
    id_prefix: "BUG-"
    id_type: short
    color: "#FFCDD2"
    border_color: "#D32F2F"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      priority:
        type: priority
      effort:
        type: effort
      why1:
        type: string
        description: "5-Whys level 1: What was the immediate cause?"
      why2:
        type: string
        description: "5-Whys level 2: Why did that happen?"
      why3:
        type: string
        description: "5-Whys level 3: Why did that happen?"
      why4:
        type: string
        description: "5-Whys level 4: Why did that happen?"
      why5:
        type: string
        description: "5-Whys level 5: What is the systemic root cause?"
      prevention:
        type: string
        description: How to prevent similar bugs
      status:
        type: bug_status
        required: true
    default_sort:
      - property: priority
      - property: status
  ticket:
    label: Ticket
    aliases: [task, issue]
    id_prefix: "TKT-"
    id_type: short
    color: "#FFFDE7"
    border_color: "#FBC02D"
    properties:
      title:
        type: string
        required: true
      kind:
        type: ticket_kind
        required: true
      priority:
        type: priority
      effort:
        type: effort
      tags:
        type: ticket_tag
        list: true
      status:
        type: ticket_status
        required: true
    default_sort:
      - property: priority
      - property: status
    content:
      required-headers:
        - "## Description"
  risk:
    label: Risk
    id_prefix: "RISK-"
    id_type: short
    color: "#FFEBEE"
    border_color: "#D32F2F"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      likelihood:
        type: likelihood
        required: true
      impact:
        type: impact
        required: true
      mitigation:
        type: string
        description: How this risk will be/was addressed
      status:
        type: risk_status
        required: true
    default_sort:
      - property: impact
        direction: desc
      - property: likelihood
        direction: desc
  # ===================
  # QA / Testing
  # ===================
  test-case:
    label: Test Case
    aliases: [test]
    id_prefix: "TC-"
    id_type: short
    color: "#F3E5F5"
    border_color: "#7B1FA2"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      kind:
        type: test_kind
        required: true
      automated:
        type: boolean
        default: "true"
      location:
        type: string
        description: File path or test function name
      status:
        type: test_status
        required: true
    default_sort:
      - property: kind
      - property: title
  test-suite:
    label: Test Suite
    aliases: [suite]
    id_prefix: "TS-"
    id_type: short
    color: "#EDE7F6"
    border_color: "#512DA8"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      kind:
        type: test_kind
      status:
        type: test_status
        required: true
    default_sort:
      - property: kind
      - property: title
  qa-report:
    label: QA Report
    aliases: [qa]
    id_prefix: "QA-"
    id_type: short
    color: "#FCE4EC"
    border_color: "#C2185B"
    properties:
      title:
        type: string
        required: true
      date:
        type: date
        required: true
      version:
        type: string
        description: Version or commit being tested
      passed:
        type: integer
      failed:
        type: integer
      skipped:
        type: integer
      notes:
        type: string
      status:
        type: qa_result
        required: true
    default_sort:
      - property: date
        direction: desc
  # ===================
  # Preventive Measures
  # ===================
  automated-measure:
    label: Automated Measure
    aliases: [check, guard]
    id_type: manual
    color: "#C8E6C9"
    border_color: "#388E3C"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      kind:
        type: automated_measure_kind
        required: true
      location:
        type: string
        required: true
        description: Where this measure is implemented (file, CI config, etc.)
      status:
        type: measure_status
        required: true
    default_sort:
      - property: kind
      - property: title
  manual-measure:
    label: Manual Measure
    aliases: [process, guideline]
    id_type: manual
    color: "#E8EAF6"
    border_color: "#3F51B5"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      kind:
        type: manual_measure_kind
        required: true
      location:
        type: string
        description: Where this measure is documented (file, wiki, etc.)
      status:
        type: measure_status
        required: true
    default_sort:
      - property: kind
      - property: title
  # ===================
  # Documentation
  # ===================
  guide:
    label: Guide
    id_type: manual
    color: "#E0F7FA"
    border_color: "#0097A7"
    properties:
      title:
        type: string
        required: true
      summary:
        type: string
      order:
        type: integer
        description: Display order within section
      audience:
        type: audience
      path:
        type: string
        description: File path relative to docs/
      status:
        type: doc_status
        required: true
    default_sort:
      - property: order
      - property: title
  tutorial:
    label: Tutorial
    id_type: manual
    color: "#E0F2F1"
    border_color: "#00796B"
    properties:
      title:
        type: string
        required: true
      summary:
        type: string
      audience:
        type: audience
      path:
        type: string
        description: File path relative to docs/
      status:
        type: doc_status
        required: true
    default_sort:
      - property: audience
      - property: title
  scenario:
    label: Scenario
    id_type: manual
    color: "#F1F8E9"
    border_color: "#689F38"
    properties:
      title:
        type: string
        required: true
      summary:
        type: string
      domain:
        type: string
        description: Domain this scenario applies to (e.g., compliance, architecture)
      path:
        type: string
        description: File path relative to docs/
      status:
        type: doc_status
        required: true
    default_sort:
      - property: domain
      - property: title
  doc-task:
    label: Doc Task
    id_prefix: "DOC-"
    id_type: short
    color: "#ECEFF1"
    border_color: "#546E7A"
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      priority:
        type: priority
      status:
        type: ticket_status
        required: true
    default_sort:
      - property: priority
      - property: status
  # ===================
  # Workflow Checklists
  # ===================
  planning-checklist:
    label: Planning Checklist
    id_prefix: "PLAN-"
    id_type: short
    color: "#E3F2FD"
    border_color: "#1976D2"
    properties:
      title:
        type: string
        required: true
        default: "Planning"
      status:
        type: checklist_status
        required: true
    content:
      required-headers:
        - "## Understanding"
        - "## Approach"
        - "## Risk Assessment"
  bug-analysis-checklist:
    label: Bug Analysis Checklist
    id_prefix: "BUGA-"
    id_type: short
    color: "#FFCDD2"
    border_color: "#D32F2F"
    properties:
      title:
        type: string
        required: true
        default: "Bug Analysis"
      status:
        type: checklist_status
        required: true
    content:
      required-headers:
        - "## Reproduction"
        - "## Root Cause"
        - "## Fix Planning"
  implementation-checklist:
    label: Implementation Checklist
    id_prefix: "IMPL-"
    id_type: short
    color: "#E8F5E9"
    border_color: "#388E3C"
    properties:
      title:
        type: string
        required: true
        default: "Implementation"
      status:
        type: checklist_status
        required: true
    content:
      required-headers:
        - "## Development"
        - "## Quality"
  review-checklist:
    label: Review Checklist
    id_prefix: "REV-"
    id_type: short
    color: "#FFF3E0"
    border_color: "#F57C00"
    properties:
      title:
        type: string
        required: true
        default: "Review"
      status:
        type: checklist_status
        required: true
    content:
      required-headers:
        - "## Automated Checks"
        - "## Manual Review"
  docs-checklist:
    label: Documentation Checklist
    id_prefix: "DOCS-"
    id_type: short
    color: "#E0F7FA"
    border_color: "#0097A7"
    properties:
      title:
        type: string
        required: true
        default: "Documentation"
      status:
        type: checklist_status
        required: true
    content:
      required-headers:
        - "## Code Documentation"
        - "## Project Documentation"
  # ===================
  # Code Review Tracking
  # ===================
  review-response:
    label: Review Response
    aliases: [review-finding, code-review-item]
    id_prefix: "RR-"
    id_type: short
    color: "#FFF8E1"
    border_color: "#FF8F00"
    description: Tracks code review findings and their resolutions
    properties:
      title:
        type: string
        required: true
        description: Brief description of the review finding
      finding:
        type: string
        required: true
        description: The specific issue identified in code review
      severity:
        type: review_response_severity
        required: true
        description: How critical is this finding?
      resolution:
        type: string
        description: How this finding was addressed (required when status != open)
      reason:
        type: string
        description: Justification for wont-fix or deferred status
      status:
        type: review_response_status
        required: true
relations:
  # ===================
  # Ticket → Work Relations
  # ===================
  implements:
    label: implements
    description: Ticket delivers this feature
    from: [ticket]
    to: [feature]
    inverse: implementedBy
    min_outgoing: 1 # Every ticket should implement at least one feature
  fixes:
    label: fixes
    description: Bug fixes an issue in this feature
    from: [bug]
    to: [feature]
    inverse: fixedBy
    min_outgoing: 1 # Every bug must be linked to the feature it fixes
  affects:
    label: affects
    description: Work touches this architectural concept
    from: [ticket, bug, doc-task]
    to: [concept]
    inverse: affectedBy
    min_outgoing: 1 # Work items must specify which concepts they affect
  depends-on:
    label: depends on
    description: Requires this to be completed first
    from: [ticket, bug, feature, doc-task]
    to: [ticket, bug, feature, doc-task]
    inverse: blocks
  # ===================
  # Architecture Relations
  # ===================
  decides:
    label: decides
    description: Decision governs how this concept works
    from: [decision]
    to: [concept]
    inverse: decidedBy
    min_outgoing: 1 # Every decision must relate to at least one concept
  supersedes:
    label: supersedes
    description: Replaces previous decision
    from: [decision]
    to: [decision]
    inverse: supersededBy
    max_outgoing: 1 # A decision supersedes at most one other
  refines:
    label: refines
    description: More specific version of
    from: [concept, feature]
    to: [concept, feature]
    inverse: refinedBy
  requires:
    label: requires
    description: Feature requires this concept to exist
    from: [feature]
    to: [concept]
    inverse: requiredBy
    min_outgoing: 1 # Features must be grounded in at least one concept
  concept-depends-on:
    label: depends on
    description: Concept depends on another concept
    from: [concept]
    to: [concept]
    inverse: dependencyOf
  # ===================
  # Ideation Relations
  # ===================
  inspires:
    label: inspires
    description: Idea inspires this feature, concept, or other idea
    from: [idea]
    to: [feature, concept, future-concept, idea]
    inverse: inspiredBy
  promotes-to:
    label: promotes to
    description: Idea was promoted to a feature or future-concept
    from: [idea]
    to: [feature, future-concept]
    inverse: promotedFrom
    max_outgoing: 1 # An idea promotes to at most one thing
  elaborates:
    label: elaborates
    description: Future concept elaborates on an idea
    from: [future-concept]
    to: [idea]
    inverse: elaboratedBy
    min_outgoing: 1 # Future concepts should trace back to ideas
  extends-concept:
    label: extends
    description: Future concept would extend this existing concept
    from: [future-concept]
    to: [concept]
    inverse: extendedBy
  enables:
    label: enables
    description: Future concept would enable these features
    from: [future-concept]
    to: [feature]
    inverse: enabledBy
  replaces:
    label: would replace
    description: Future concept would replace this existing concept or feature
    from: [future-concept]
    to: [concept, feature]
    inverse: replacedBy
  blocked-by-concept:
    label: blocked by
    description: Idea/future-concept is blocked by missing concept or feature
    from: [idea, future-concept]
    to: [concept, feature, future-concept]
    inverse: blocks-idea
  related-idea:
    label: related to
    description: Ideas that are related or could be combined
    from: [idea]
    to: [idea]
    symmetric: true
  # ===================
  # Root Cause Analysis (bugs only)
  # ===================
  caused-by:
    label: caused by
    description: Bug was caused by this concept, decision, or prior change
    from: [bug]
    to: [concept, decision, ticket, bug]
    inverse: caused
  # ===================
  # Prevention (bugs only)
  # ===================
  prevented-by:
    label: could be prevented by
    description: Bug could have been caught by this measure (but wasn't)
    from: [bug]
    to: [automated-measure, manual-measure]
    inverse: shouldPrevent
  detected-by:
    label: detected by
    description: Bug was detected by this measure
    from: [bug]
    to: [automated-measure, manual-measure, test-case, test-suite, qa-report]
    inverse: detected
  adds-measure:
    label: adds measure
    description: Bug fix must add an automated preventive measure
    from: [bug]
    to: [automated-measure]
    inverse: addedBy
    min_outgoing: 1 # Every bug must result in an automated preventive measure
  protects:
    label: protects
    description: Measure protects this concept from bugs
    from: [automated-measure, manual-measure]
    to: [concept]
    inverse: protectedBy
  # ===================
  # Risk Relations
  # ===================
  mitigates:
    label: mitigates
    description: Addresses this risk
    from: [ticket, bug, decision]
    to: [risk]
    inverse: mitigatedBy
  introduces:
    label: introduces
    description: This change introduces a risk
    from: [ticket, bug, decision, feature]
    to: [risk]
    inverse: introducedBy
  # ===================
  # QA Relations (logical verification)
  # ===================
  verifies:
    label: verifies
    description: Test validates this feature/ticket/bug-fix works correctly
    from: [test-case, test-suite]
    to: [feature, ticket, bug]
    inverse: verifiedBy
    min_outgoing: 1 # Tests must verify at least one feature/ticket/bug
  test-covers:
    label: covers
    description: Test exercises this architectural concept
    from: [test-case, test-suite]
    to: [concept]
    inverse: testedBy
    min_outgoing: 1 # Tests must cover at least one concept
  contains:
    label: contains
    description: Suite contains these test cases
    from: [test-suite]
    to: [test-case]
    inverse: containedIn
    min_outgoing: 1 # Suites must contain at least one test
  found-by:
    label: found by
    description: Bug was discovered by this test or QA session
    from: [bug]
    to: [test-case, qa-report]
    inverse: found
  regression-for:
    label: regression test for
    description: Test prevents regression of this fixed bug
    from: [test-case]
    to: [bug]
    inverse: hasRegressionTest
  blocks-release:
    label: blocks release
    description: This issue blocks the release
    from: [ticket, bug, risk]
    to: [qa-report]
    inverse: releaseBlockedBy
  tested-in:
    label: tested in
    description: Feature/ticket/bug was tested in this QA session
    from: [feature, ticket, bug]
    to: [qa-report]
    inverse: tests
    min_incoming: 1 # QA reports must test at least one feature/ticket/bug
  # ===================
  # Documentation Relations
  # ===================
  explains:
    label: explains
    description: Guide/tutorial explains this concept
    from: [guide, tutorial]
    to: [concept]
    inverse: explainedBy
  covers:
    label: covers
    description: Guide/tutorial covers this feature
    from: [guide, tutorial]
    to: [feature]
    inverse: coveredBy
  demonstrates:
    label: demonstrates
    description: Scenario/tutorial demonstrates this feature in practice
    from: [scenario, tutorial]
    to: [feature]
    inverse: demonstratedBy
  prerequisite:
    label: prerequisite
    description: This guide/tutorial requires reading another first
    from: [guide, tutorial]
    to: [guide, concept]
    inverse: prerequisiteFor
  documents:
    label: documents
    description: Documentation describes this decision
    from: [guide, tutorial, scenario]
    to: [decision]
    inverse: documentedBy
  updates:
    label: updates
    description: Doc task updates this documentation
    from: [doc-task]
    to: [guide, tutorial, scenario]
    inverse: updatedBy
    min_outgoing: 1 # Every doc-task must update at least one doc
  triggered-by:
    label: triggered by
    description: Doc work triggered by this change
    from: [doc-task]
    to: [ticket, bug, feature, decision]
    inverse: triggers
    min_outgoing: 1 # Doc tasks must be triggered by something
  # ===================
  # Workflow Checklist Relations
  # ===================
  has-planning:
    label: has planning
    description: Ticket's planning checklist
    from: [ticket, feature]
    to: [planning-checklist]
    inverse: plans
    max_outgoing: 1
  has-bug-analysis:
    label: has analysis
    description: Bug's root cause analysis checklist
    from: [bug]
    to: [bug-analysis-checklist]
    inverse: analyzes
    max_outgoing: 1
  has-implementation:
    label: has implementation
    description: Implementation checklist for this work
    from: [ticket, bug]
    to: [implementation-checklist]
    inverse: implementation-for
    max_outgoing: 1
  has-review:
    label: has review
    description: Review checklist for this work
    from: [ticket, bug, feature]
