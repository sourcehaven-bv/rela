  - name: ci-no-blocked-bugs
    description: "CI: Bugs in 'blocked' status cannot be merged - resolve or revert"
    entity_type: bug
    when:
      - "status=blocked"
    then:
      - "status!=blocked"
    severity: error
  # --- Checklists in progress ---
  - name: ci-no-in-progress-checklists-planning
    description: "CI: Planning checklists in 'in-progress' cannot be merged"
    entity_type: planning-checklist
    when:
      - "status=in-progress"
    then:
      - "status!=in-progress"
