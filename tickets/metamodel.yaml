  - name: ci-no-in-progress-checklists-bug-analysis
    description: "CI: Bug analysis checklists in 'in-progress' cannot be merged"
    entity_type: bug-analysis-checklist
    when:
      - "status=in-progress"
    then:
      - "status!=in-progress"
    severity: error
  - name: ci-no-in-progress-checklists-implementation
    description: "CI: Implementation checklists in 'in-progress' cannot be merged"
    entity_type: implementation-checklist
    when:
      - "status=in-progress"
    then:
      - "status!=in-progress"
    severity: error
  - name: ci-no-in-progress-checklists-review
    description: "CI: Review checklists in 'in-progress' cannot be merged"
    entity_type: review-checklist
    when:
      - "status=in-progress"
    then:
      - "status!=in-progress"
    severity: error
  - name: ci-no-in-progress-checklists-docs
    description: "CI: Docs checklists in 'in-progress' cannot be merged"
    entity_type: docs-checklist
    when:
      - "status=in-progress"
    then:
      - "status!=in-progress"
    severity: error
  # --- Review responses must be resolved ---
  - name: ci-no-open-review-responses
    description: "CI: Open review responses cannot be merged - address or close them"
    entity_type: review-response
    when:
      - "status=open"
    then:
      - "status!=open"
    severity: error
  # --- Risk validations ---
  - name: identified-risk-needs-description
    description: "Identified risks should have a description"
    entity_type: risk
    when:
      - "status=identified"
    then:
      - "description!="
    severity: warning
  - name: mitigated-risk-needs-mitigation
    description: "Mitigated risks must document how they were addressed"
    entity_type: risk
    when:
      - "status=mitigated"
    then:
      - "mitigation!="
    severity: error
  - name: accepted-risk-needs-mitigation
    description: "Accepted risks must document why acceptance is appropriate"
    entity_type: risk
    when:
      - "status=accepted"
    then:
      - "mitigation!="
    severity: error
  - name: resolved-risk-needs-mitigation
    description: "Resolved risks must document how they were eliminated"
    entity_type: risk
    when:
      - "status=resolved"
    then:
      - "mitigation!="
    severity: error
  # --- Test validations ---
  - name: active-test-case-needs-location
    description: "Active test cases should specify their location (file/function)"
    entity_type: test-case
    when:
      - "status=active"
    then:
      - "location!="
    severity: warning
  - name: active-test-case-needs-description
    description: "Active test cases should have a description"
    entity_type: test-case
    when:
      - "status=active"
    then:
      - "description!="
    severity: warning
  - name: active-test-suite-needs-description
    description: "Active test suites should have a description"
    entity_type: test-suite
    when:
      - "status=active"
    then:
      - "description!="
    severity: warning
  # --- Doc-task validations ---
  - name: in-progress-doc-task-needs-priority
    description: "In-progress doc tasks must have priority assigned"
    entity_type: doc-task
    when:
      - "status=in-progress"
    then:
      - "priority!="
    severity: error
  - name: ready-doc-task-needs-description
    description: "Ready doc tasks should have a description"
    entity_type: doc-task
    when:
      - "status=ready"
    then:
      - "description!="
    severity: warning
  - name: in-progress-doc-task-needs-description
    description: "In-progress doc tasks must have a description"
    entity_type: doc-task
    when:
      - "status=in-progress"
    then:
      - "description!="
    severity: error
# ===================
# Automations
# ===================
# Automatically create workflow checklists when tickets/bugs transition to specific statuses.
# Uses if_exists: skip to avoid creating duplicates if the relation already exists.
automations:
  # --- Ticket Workflow ---
  - name: ticket-planning-checklist
    description: Create planning checklist when ticket enters planning
    on:
      entity: [ticket]
      property: status
      becomes: planning
    do:
      - create_entity:
          type: planning-checklist
          properties:
            title: "Planning: {{new.title}}"
            status: in-progress
          relation: has-planning
          if_exists: skip
  - name: ticket-implementation-checklist
    description: Create implementation checklist when ticket enters in-progress
    on:
      entity: [ticket]
      property: status
      becomes: in-progress
    do:
      - create_entity:
          type: implementation-checklist
          properties:
            title: "Implementation: {{new.title}}"
            status: in-progress
          relation: has-implementation
          if_exists: skip
  - name: ticket-review-checklist
    description: Create review checklist when ticket enters review
    on:
      entity: [ticket]
      property: status
      becomes: review
    do:
      - create_entity:
          type: review-checklist
          properties:
            title: "Review: {{new.title}}"
            status: in-progress
          relation: has-review
          if_exists: skip
  # --- Bug Workflow ---
  - name: bug-analysis-checklist
    description: Create bug analysis checklist when bug enters analyzing
    on:
      entity: [bug]
      property: status
      becomes: analyzing
    do:
      - create_entity:
          type: bug-analysis-checklist
          properties:
            title: "Analysis: {{new.title}}"
            status: in-progress
          relation: has-bug-analysis
          if_exists: skip
  - name: bug-implementation-checklist
    description: Create implementation checklist when bug enters in-progress
    on:
      entity: [bug]
      property: status
      becomes: in-progress
    do:
      - create_entity:
          type: implementation-checklist
          properties:
            title: "Implementation: {{new.title}}"
            status: in-progress
          relation: has-implementation
          if_exists: skip
  - name: bug-review-checklist
    description: Create review checklist when bug enters review
    on:
      entity: [bug]
      property: status
      becomes: review
    do:
      - create_entity:
          type: review-checklist
          properties:
            title: "Review: {{new.title}}"
            status: in-progress
          relation: has-review
          if_exists: skip
