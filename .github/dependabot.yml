version: 2

# Cooldown waits N days after a version is published before opening a PR.
# This is the supply-chain soak: malicious versions are typically caught
# (via advisories, retractions, account lock) within days of publication.
# Once the PR opens, dependabot-auto-merge.yml merges immediately on green CI.
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      charm-tui:
        patterns:
          - "github.com/charmbracelet/*"
          - "github.com/muesli/*"
        update-types:
          - "minor"
          - "patch"
      golang-org:
        patterns:
          - "golang.org/x/*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # No cooldown for trusted-org Actions (actions/*, dependabot/*, github/*)
    # is enforced in the auto-merge workflow; third-party Actions still go
    # through cooldown here as an extra layer.
    cooldown:
      default-days: 7
      exclude:
        - "actions/*"
        - "dependabot/*"
        - "github/*"
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
    # vue-router@5+ on npm is a separate package (the vue-router unplugin
    # tool, by the same maintainers); the actual router for Vue 3 stays
    # on the 4.x line. Pin to 4.x to keep Dependabot from re-proposing
    # what looks like a major bump but is in fact a different package.
    ignore:
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-major"]
    # Groups bundle minor+patch only. Majors fall out as individual PRs
    # so a single breaking upgrade can't block the safe ones in its group.
    # Auto-merge is unconditional on green CI, so each PR (group or
    # singleton) merges itself the moment its checks pass.
    groups:
      vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "@vitejs/*"
          - "pinia"
          - "@pinia/*"
        update-types:
          - "minor"
          - "patch"
      build-tooling:
        patterns:
          - "vite"
          - "vite-*"
          - "typescript"
          - "typescript-*"
          - "tsx"
          - "vue-tsc"
        update-types:
          - "minor"
          - "patch"
      lint-and-format:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "prettier-*"
          - "jscpd"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "happy-dom"
          - "fast-check"
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(frontend)"

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(e2e)"
