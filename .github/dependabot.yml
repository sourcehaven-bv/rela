version: 2

# Cooldown waits N days after a version is published before opening a PR.
# This is the supply-chain soak: malicious versions are typically caught
# (via advisories, retractions, account lock) within days of publication.
# Once the PR opens, dependabot-auto-merge.yml merges immediately on green CI.
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      charm-tui:
        patterns:
          - "github.com/charmbracelet/*"
          - "github.com/muesli/*"
      golang-org:
        patterns:
          - "golang.org/x/*"
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # No cooldown for trusted-org Actions (actions/*, dependabot/*, github/*)
    # is enforced in the auto-merge workflow; third-party Actions still go
    # through cooldown here as an extra layer.
    cooldown:
      default-days: 7
      exclude:
        - "actions/*"
        - "dependabot/*"
        - "github/*"
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      vue-ecosystem:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "@vitejs/*"
          - "pinia"
          - "@pinia/*"
      build-tooling:
        patterns:
          - "vite"
          - "vite-*"
          - "typescript"
          - "typescript-*"
          - "tsx"
          - "vue-tsc"
      lint-and-format:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "prettier-*"
          - "jscpd"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "happy-dom"
          - "fast-check"
          - "@playwright/*"
    commit-message:
      prefix: "deps(frontend)"

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
    commit-message:
      prefix: "deps(e2e)"
