name: Dependabot Auto-Merge

# Soak protection lives in .github/dependabot.yml via `cooldown:` — by the
# time a PR opens here, the dep version has already been published long
# enough to catch retractions, advisories, and compromised releases. So we
# approve and enable auto-merge unconditionally for every Dependabot PR.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      # App token is used for approve / auto-merge so the eventual merge
      # commit can trigger downstream workflows. GITHUB_TOKEN-authored
      # approvals are also silently ignored by branch protection's
      # "require approving review" rule, so the App token future-proofs
      # against that being enabled later.
      - name: Generate app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Approve and enable auto-merge
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
