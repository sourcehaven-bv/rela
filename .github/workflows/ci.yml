name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage thresholds
        uses: vladopajic/go-test-coverage@v2.18.8
        with:
          config: .testcoverage.yml
          github-action-output: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.out

  vulncheck:
    name: Vulnerability Check
    # Only gate PRs that touch Go dependencies. Non-dep PRs get their vuln signal
    # from the weekly schedule in security.yml, which auto-opens an update PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect go.mod / go.sum changes
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event — running vulncheck."
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE_SHA"...HEAD -- go.mod go.sum | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "go.mod or go.sum changed — running vulncheck."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dep changes — skipping (weekly schedule covers this)."
          fi

      - name: Set up Go
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run govulncheck
        if: steps.detect.outputs.changed == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          ./scripts/govulncheck-filtered.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install golangci-lint
        # Build from source against the active Go toolchain so the linter can
        # analyse our code regardless of the go.mod toolchain directive.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Run golangci-lint
        run: golangci-lint run ./...

  arch-lint:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@latest

      - name: Check architecture
        run: go-arch-lint check

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: "**/*.md"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build rela-server (embeds built frontend)
        run: |
          cd frontend && npm run build && cd ..
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o bin/rela-server ./cmd/rela-server

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Lint e2e (Page Object Pattern enforcement)
        working-directory: e2e
        run: npm run lint

      - name: Typecheck e2e
        working-directory: e2e
        run: npm run typecheck

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: e2e/test-results
          retention-days: 7

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run fuzz tests
        run: |
          go test -run='^$' -fuzz='^FuzzParseDocument$' -fuzztime=10s ./internal/markdown/
          go test -run='^$' -fuzz='^FuzzParseEntityID$' -fuzztime=10s ./internal/entity/
          go test -run='^$' -fuzz='^FuzzValidateID$' -fuzztime=10s ./internal/entity/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, vulncheck, lint, arch-lint, lint-markdown, fuzz, frontend, e2e]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build -o bin/rela ./cmd/rela

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: rela-linux
          path: bin/rela

  rela-tickets:
    name: Rela Tickets
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether ticket gate applies
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]] \
             || [[ "$HEAD_REF" == chore/* ]] \
             || [[ "$HEAD_REF" == dependabot/* ]]; then
            echo "applies=false" >> "$GITHUB_OUTPUT"
            echo "Ticket gate does not apply for $EVENT_NAME / $HEAD_REF; reporting success."
          else
            echo "applies=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.applies == 'true'
        with:
          fetch-depth: 0

      - name: Set up Go
        if: steps.gate.outputs.applies == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build rela
        if: steps.gate.outputs.applies == 'true'
        run: go build -o bin/rela ./cmd/rela

      - name: Check for new or modified bug/feature/ticket entity
        if: steps.gate.outputs.applies == 'true'
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.sha }}"

          # Get list of added or modified entity files in this PR
          # A = Added (new tickets), M = Modified (continuation work on existing tickets)
          CHANGED_ENTITIES=$(git diff --name-only --diff-filter=AM "${BASE_REF}"...HEAD -- \
            'tickets/entities/bugs/*.md' \
            'tickets/entities/features/*.md' \
            'tickets/entities/tickets/*.md' || true)

          if [[ -z "$CHANGED_ENTITIES" ]]; then
            echo ""
            echo "ERROR: PR must include a new or modified bug, feature, or ticket entity in tickets/entities/"
            echo ""
            echo "Create one with:"
            echo "  rela create bug --project tickets -t 'Title'"
            echo "  rela create feature --project tickets -t 'Title'"
            echo "  rela create ticket --project tickets -t 'Title'"
            exit 1
          fi

          echo "Found ticket entities:"
          echo "$CHANGED_ENTITIES"

      - name: Run rela validate
        if: steps.gate.outputs.applies == 'true'
        run: |
          set -euo pipefail
          cd tickets

          echo "Running validation checks..."
          ../bin/rela validate --check cardinality --check properties --check validations

          echo ""
          echo "All rela checks passed!"

  demos:
    name: Demos
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Build rela
        run: go build -o bin/rela ./cmd/rela

      - name: Run demo scripts
        run: |
          set -euo pipefail
          # Skyward demos chain off setup; run it first if present.
          if [ -x scripts/setup-skyward-demo.sh ]; then
            echo "==> scripts/setup-skyward-demo.sh"
            scripts/setup-skyward-demo.sh
          fi
          shopt -s nullglob
          for demo in scripts/demo-*.sh; do
            echo ""
            echo "==> ${demo}"
            "${demo}"
          done

      - name: Run shell-level e2e tests
        run: |
          set -euo pipefail
          shopt -s nullglob
          for e2e in scripts/e2e-*.sh; do
            echo ""
            echo "==> ${e2e}"
            "${e2e}"
          done

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build rela
        run: go build -o bin/rela ./cmd/rela

      - name: Generate docs
        run: ./scripts/generate-docs.sh

      - name: Check docs are up to date
        run: |
          git diff --exit-code docs/ README.md || \
            (echo "" && \
             echo "ERROR: docs/ or README.md is out of date with docs-project/ entities." && \
             echo "Run 'just docs' locally and commit the changes." && \
             echo "" && \
             echo "Changed files:" && \
             git diff --name-only docs/ README.md && \
             exit 1)
