# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint

# Default state for all rules
default: true

# MD013 - Line length
# Allow longer lines since we have code examples and tables
line-length:
  line_length: 120
  heading_line_length: 120
  code_block_line_length: 120
  tables: false

# MD024 - Multiple headings with the same content
# Allow sibling headings with the same content (common in changelogs)
no-duplicate-heading:
  siblings_only: true

# MD033 - Inline HTML
# Allow some HTML elements that are useful in GitHub markdown
no-inline-html:
  allowed_elements:
    - br
    - details
    - summary
    - kbd
    - sub
    - sup

# MD041 - First line should be a top-level heading
# Disable for files that may start with frontmatter or badges
first-line-heading: false

# MD046 - Code block style
# Prefer fenced code blocks
code-block-style:
  style: fenced

# MD048 - Code fence style
# Use backticks for code fences
code-fence-style:
  style: backtick
