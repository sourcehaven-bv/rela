# markdownlint-cli2 configuration
# Extends .markdownlint.yaml for linting rules

ignores:
  - node_modules/**
  - docs/templates/**
  - .claude/**
  - .ignored/**
  - "**/.ignored/**"
  - tickets/**
  # Go test fixtures: deliberately-malformed markdown used to exercise the
  # renderer (idempotency, panic recovery). Linting them defeats their purpose.
  - "**/testdata/**"
