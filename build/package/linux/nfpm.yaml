name: rela-desktop
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: default
priority: optional
maintainer: Sourcehaven BV
description: Traceability desktop app for managing entities and relationships
vendor: Sourcehaven BV
homepage: https://github.com/Sourcehaven-BV/rela
license: MIT

overrides:
  deb:
    depends:
      - libgtk-3-0
      - libwebkit2gtk-4.0-37
  rpm:
    depends:
      - gtk3
      - webkit2gtk3

contents:
  - src: rela-desktop
    dst: /usr/bin/rela-desktop
    file_info:
      mode: 0755
  - src: build/package/linux/rela-desktop.desktop
    dst: /usr/share/applications/rela-desktop.desktop
  - src: build/package/linux/rela-desktop.png
    dst: /usr/share/icons/hicolor/256x256/apps/rela-desktop.png
  - src: build/package/linux/rela-desktop-512.png
    dst: /usr/share/icons/hicolor/512x512/apps/rela-desktop.png
