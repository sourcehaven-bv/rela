# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: rela

before:
  hooks:
    - go mod tidy

builds:
  - id: rela
    main: ./cmd/rela
    binary: rela
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Sourcehaven-BV/rela/internal/cli.Version={{.Version}}
    flags:
      - -trimpath

  - id: rela-server
    main: ./cmd/rela-server
    binary: rela-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

  # PostgreSQL-backed variants. Selected by the `postgres` build tag: the
  # store and search index live in PostgreSQL (no bleve, no on-disk markdown
  # store). Shipped under -postgres binary + archive names so they never
  # collide with the default filesystem binaries on PATH.
  - id: rela-postgres
    main: ./cmd/rela
    binary: rela-postgres
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Sourcehaven-BV/rela/internal/cli.Version={{.Version}}
    flags:
      - -trimpath
      - -tags=postgres

  - id: rela-server-postgres
    main: ./cmd/rela-server
    binary: rela-server-postgres
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath
      - -tags=postgres

archives:
  # Default (filesystem) binaries: rela + rela-server bundled together,
  # keeping the historical archive name so existing download URLs/scripts
  # keep working.
  - id: default
    ids:
      - rela
      - rela-server
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

  # PostgreSQL binaries in their own -postgres archive so a user can't
  # accidentally extract both variants onto the same PATH.
  - id: postgres
    ids:
      - rela-postgres
      - rela-server-postgres
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-postgres_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: Sourcehaven-BV
    name: rela
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
  header: |
    ## macOS Desktop App

    The macOS desktop app is ad-hoc signed. After opening the DMG and dragging the app
    to Applications, macOS Gatekeeper may block it. To allow it to run:

    ```bash
    xattr -cr "/Applications/Rela Desktop.app"
    ```

    Alternatively, right-click the app and select **Open**, then confirm in the dialog.

