version: "2"
run:
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - intrange
    - lll
    - makezero
    - mirror
    - misspell
    - mnd
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    depguard:
      rules:
        no-stdlib-log:
          list-mode: lax
          files:
            - '!**/internal/mcp/server.go'
          allow:
            - log/slog
          deny:
            - pkg: log
              desc: use log/slog instead of stdlib log; the stdlib log package is global mutable state with no levels and races with parallel tests
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 100
      statements: 60
      ignore-comments: true
    gocognit:
      min-complexity: 30
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - whyNoLint
        - hugeParam
        - sprintfQuotedString
        - octalLiteral
        # `entity` shadowing the entity package is idiomatic across 40+ sites;
        # stdlib shadows (e.g. `context`) should be caught by reviewers in PR.
        - importShadow
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
    gocyclo:
      min-complexity: 35
    godot:
      scope: toplevel
      capital: true
    gosec:
      excludes:
        - G104
        - G204
        - G304
        - G306
        # Taint-analysis checks (gosec v2) surface hardening work that
        # belongs in FEAT-ESLP (data-entry server hardening). Deferring
        # these so the v2 migration doesn't block on threat-model decisions;
        # track the work under that feature instead.
        - G702  # command injection via taint analysis
        - G703  # path traversal via taint analysis
        - G704  # SSRF via taint analysis
        - G705  # XSS via taint analysis
        - G706  # log injection via taint analysis
      config:
        global:
          audit: true
    govet:
      disable:
        - fieldalignment
      enable-all: true
    lll:
      line-length: 120
      tab-width: 4
    misspell:
      locale: US
      ignore-rules:
        - rela
        - analyses
        - cancelled
        - eles
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "10"
        - "100"
        - "0644"
        - "0755"
        - "0o644"
        - "0o755"
      ignored-functions:
        - strings.SplitN
        - make
        - cobra.ExactArgs
        - cobra.MinimumNArgs
        - cobra.MaximumNArgs
        - cobra.RangeArgs
    nakedret:
      max-func-lines: 30
    nestif:
      min-complexity: 6
    nolintlint:
      require-explanation: true
      require-specific: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
    unparam:
      check-exported: false
    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: true
    whitespace:
      multi-if: true
      multi-func: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - forcetypeassert
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - lll
          - mnd
          - noctx
          - prealloc
        path: _test\.go
      - linters:
          - usetesting
        path: internal/testutil/.*\.go
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - lll
          - mnd
          - prealloc
          - revive
          - testifylint
          - thelper
          - unused
        path: internal/store/storetest/
      - linters:
          - lll
        source: ^//|`.*`|".*"
      - path: _test\.go
        text: 'mnd:'
      - path: _test\.go
        text: dot-imports
      - path: internal/cli/.*\.go
        text: unused-parameter.*(cmd|args)
      - linters:
          - funlen
          - gocognit
        path: internal/search/searchparser/.*\.go
      - linters:
          - nilerr
          - unparam
        path: internal/mcp/tools_.*\.go
      - linters:
          - funlen
          - gocognit
          - gocyclo
          - lll
          - mnd
          - nestif
        path: internal/dataentry/.*\.go
      - linters:
          - funlen
          - gocognit
          - gocyclo
          - lll
          - mnd
          - nestif
        path: internal/dataentryconfig/.*\.go
      - linters:
          - gocritic
        text: evalOrder
      - linters:
          - gocritic
        text: rangeValCopy
      - linters:
          - funlen
        path: internal/metamodel/loader\.go
        text: DefaultMetamodelYAML
      - linters:
          - gocognit
        path: internal/metamodel/validation\.go
      - linters:
          - goconst
        path: (.+)_test\.go
    paths:
      - vendor
      - third_party
      - testdata
      - legacy-reference
      - prototypes
      - node_modules
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  fix: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/Sourcehaven-BV/rela
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party
      - testdata
      - legacy-reference
      - prototypes
      - node_modules
      - third_party$
      - builtin$
      - examples$
