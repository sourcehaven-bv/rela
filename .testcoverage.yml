# go-test-coverage configuration
# https://github.com/vladopajic/go-test-coverage
#
# Coverage is enforced as floor thresholds per package (and a project total).
# Packages may rise or fall freely within their band — no per-file ratchet.
# See CLAUDE.md "Test Coverage" for rationale.

profile: coverage.out

# Minimum coverage thresholds (floor — packages must not drop below these)
threshold:
  file: 0
  package: 0
  total: 65

# Per-package minimum thresholds.
# Set ~5pp below current measured coverage to give refactor headroom.
override:
  - path: ^internal/entity$
    threshold: 80
  - path: ^internal/errors$
    threshold: 95
  - path: ^internal/output$
    threshold: 90
  - path: ^internal/project$
    threshold: 80
  - path: ^internal/markdown$
    threshold: 85
  - path: ^internal/filter$
    threshold: 85
  - path: ^internal/metamodel$
    threshold: 65
  - path: ^internal/importer$
    threshold: 65
  - path: ^internal/dataentry$
    threshold: 55
  - path: ^internal/dataentryconfig$
    threshold: 70

# Exclude packages that are not meaningful to coverage-check
exclude:
  paths:
    - ^cmd/rela                # main entry point
    - ^internal/testutil       # test helpers
    - ^internal/store/storetest # shared conformance test kit (exercised via backends)
    - ^frontend/node_modules   # Go files in npm dependencies

# Require coverage-ignore annotations to have explanatory comments
force-annotation-comment: true
