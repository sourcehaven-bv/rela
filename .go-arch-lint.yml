version: 3

allow:
  depOnAnyVendor: false
  deepScan: false

exclude:
  - internal/testutil
  - frontend
  - .claude

excludeFiles:
  - "_test\\.go$"

# -- Components ----------------------------------------------------------
components:
  # Entry points
  cmdCli:           { in: cmd/rela }
  cmdServer:        { in: cmd/rela-server }
  cmdDesktop:       { in: cmd/rela-desktop }

  # CLI layer
  cli:              { in: internal/cli }

  # Web / UI layer
  dataentry:        { in: internal/dataentry }
  dataentryconfig:  { in: internal/dataentryconfig }
  desktop:          { in: internal/desktop }

  # Server protocols
  mcp:              { in: internal/mcp }
  openapi:          { in: internal/openapi }

  # Application services
  workspace:        { in: internal/workspace }

  # Domain services
  automation:       { in: internal/automation }
  conflict:         { in: internal/conflict }
  importer:         { in: internal/importer }
  rename:           { in: internal/rename }
  schema:           { in: internal/schema }
  templating:       { in: internal/templating }
  validation:       { in: internal/validation }
  # Core domain
  lua:              { in: internal/lua }
  scheduler:        { in: internal/scheduler }
  script:           { in: internal/script }
  metamodel:        { in: internal/metamodel }
  migration:        { in: internal/migration }
  markdown:         { in: internal/markdown }
  filter:           { in: internal/filter }
  pattern:          { in: internal/pattern }
  search:           { in: internal/search/** }

  # Infrastructure
  ai:               { in: internal/ai }
  secrets:          { in: internal/secrets }
  attachment:       { in: internal/attachment }
  git:              { in: internal/git }
  output:           { in: internal/output }
  project:          { in: internal/project }
  storage:          { in: internal/storage }

  # Shared utilities
  errors:           { in: internal/errors }
  htmlutil:         { in: internal/htmlutil }
  natsort:          { in: internal/natsort }

# -- Vendors --------------------------------------------------------------
vendors:
  bleve:       { in: github.com/blevesearch/bleve/** }
  cobra:       { in: github.com/spf13/cobra }
  glamour:     { in: github.com/charmbracelet/glamour }
  huh:         { in: github.com/charmbracelet/huh }
  yaml:        { in: gopkg.in/yaml.v3 }
  goldmark:
    in:
      - github.com/yuin/goldmark
      - github.com/yuin/goldmark/**
      - github.com/teekennedy/goldmark-markdown
      - github.com/mitchellh/go-wordwrap
  gogit:       { in: github.com/go-git/go-git/** }
  gopherlua:   { in: github.com/yuin/gopher-lua }
  runewidth:   { in: github.com/mattn/go-runewidth }
  rrulego:     { in: github.com/teambition/rrule-go }
  mcpgo:       { in: github.com/mark3labs/mcp-go/** }
  wails:       { in: github.com/wailsapp/wails/** }
  tablewriter: { in: github.com/olekukonko/tablewriter }
  color:       { in: github.com/fatih/color }
  fsnotify:    { in: github.com/fsnotify/fsnotify }
  singleflight: { in: golang.org/x/sync/singleflight }
  http2:
    in:
      - golang.org/x/net/http2
      - golang.org/x/net/http2/**

# -- Common (importable by all) -------------------------------------------
commonComponents:
  - errors
  - natsort

commonVendors:
  - yaml

# -- Dependency rules ------------------------------------------------------
deps:
  # Entry points
  cmdCli:
    mayDependOn:
      - cli
  cmdServer:
    mayDependOn:
      - dataentry
      - metamodel
      - project
      - scheduler
      - script
      - storage
      - workspace
    canUse:
      - http2
  cmdDesktop:
    mayDependOn:
      - dataentry
      - desktop
      - git
      - metamodel
      - project
      - scheduler
      - script
      - storage
      - workspace
    canUse:
      - wails
  # CLI layer — orchestrates everything
  cli:
    mayDependOn:
      - ai
      - dataentryconfig
      - filter
      - importer
      - lua
      - mcp
      - metamodel
      - output
      - project
      - rename
      - scheduler
      - schema
      - script

      - workspace
    canUse:
      - cobra
      - color
      - glamour
      - huh
      - tablewriter

  # Web / UI layer
  dataentry:
    mayDependOn:
      - conflict
      - dataentryconfig
      - filter
      - git
      - htmlutil
      - metamodel
      - migration
      - openapi
      - project
      - script
      - search
      - workspace
    canUse:
      - goldmark
      - gogit
  dataentryconfig:
    mayDependOn:
      - git
      - metamodel
  desktop:
    canUse:
      - wails

  # Server protocols
  mcp:
    mayDependOn:
      - ai
      - dataentryconfig
      - filter
      - lua
      - metamodel
      - rename
      - schema
      - script
      - search

      - workspace
    canUse:
      - mcpgo
      - fsnotify
  openapi:
    mayDependOn:
      - metamodel

  # Application services
  workspace:
    mayDependOn:
      - attachment
      - automation
      - dataentryconfig
      - htmlutil
      - markdown
      - metamodel
      - migration
      - templating
      - project
      - rename
      - search
      - storage
      - validation

    canUse:
      - goldmark
      - singleflight

  # Domain services
  automation:
    mayDependOn:
      - filter
      - metamodel
  conflict:
    mayDependOn:
      - markdown
      - metamodel
      - project
      - storage
  importer:
    mayDependOn:
      - metamodel
      - storage
  rename:
    mayDependOn:
      - metamodel
      - project
  schema:
    mayDependOn:
      - dataentryconfig
      - metamodel
      - migration

  validation:
    mayDependOn:
      - filter
      - lua
      - markdown
      - metamodel
    canUse:
      - gopherlua
  # Core domain
  metamodel:
    mayDependOn:
      - storage
    canUse:
      - rrulego
  migration:
    mayDependOn:
      - storage
  markdown:
    mayDependOn:
      - metamodel
      - storage
  templating:
    mayDependOn:
      - markdown
      - metamodel
      - natsort
      - project
      - storage
    canUse:
      - goldmark
  filter:
    mayDependOn:
      - metamodel
      - pattern
  lua:
    mayDependOn:
      - ai
      - filter
      - metamodel
      - secrets
      - workspace
    canUse:
      - goldmark
      - gopherlua
      - runewidth
      - rrulego
  scheduler:
    mayDependOn:
      - metamodel
      - project
      - script
  script:
    mayDependOn:
      - ai
      - lua
      - metamodel
      - project
  search:
    mayDependOn:
      - filter
    canUse:
      - bleve

  # Infrastructure
  # ai: pure leaf — only stdlib (net/http, log/slog, encoding/json) plus
  # yaml (already in commonVendors). The Provider interface is consumed
  # by lua, script, cli, and mcp. No mayDependOn/canUse entry needed
  # because the component is component-only with no internal deps.
  attachment:
    mayDependOn:
      - storage
  git:
    canUse:
      - gogit
  output:
    canUse:
      - color
      - tablewriter
  project:
    mayDependOn:
      - storage
  storage:
    anyProjectDeps: true
    canUse:
      - fsnotify
