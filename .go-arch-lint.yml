version: 3

allow:
  depOnAnyVendor: false
  deepScan: false

exclude:
  - internal/testutil
  - internal/store/storetest
  - internal/entitymanager/entitymanagertest
  - frontend
  - e2e
  - .claude

excludeFiles:
  - "_test\\.go$"

# -- Components ----------------------------------------------------------
components:
  # Entry points
  cmdCli:           { in: cmd/rela }
  cmdServer:        { in: cmd/rela-server }
  cmdDesktop:       { in: cmd/rela-desktop }

  # CLI layer
  cli:              { in: internal/cli }

  # Web / UI layer
  dataentry:        { in: internal/dataentry }
  dataentryconfig:  { in: internal/dataentryconfig }
  desktop:          { in: internal/desktop }

  # Server protocols
  mcp:              { in: internal/mcp }
  openapi:          { in: internal/openapi }

  # Application services
  app:              { in: internal/app }
  appbuild:         { in: internal/appbuild }
  appbuildtest:     { in: internal/appbuild/appbuildtest }

  # Domain services
  analysis:         { in: internal/analysis }
  attachment:       { in: internal/attachment }
  autocascade:      { in: internal/autocascade }
  automation:       { in: internal/automation }
  conflict:         { in: internal/conflict }
  entitymanager:    { in: internal/entitymanager }
  importer:         { in: internal/importer }
  rename:           { in: internal/rename }
  renametype:       { in: internal/renametype }
  schema:           { in: internal/schema }
  templating:       { in: internal/templating }
  predicate:        { in: internal/predicate }
  tracer:           { in: internal/tracer }
  validation:       { in: internal/validation }
  validator:        { in: internal/validator }

  # Core domain
  entity:           { in: internal/entity }
  lua:              { in: internal/lua }
  scheduler:        { in: internal/scheduler }
  script:           { in: internal/script }
  metamodel:        { in: internal/metamodel }
  migration:        { in: internal/migration }
  markdown:         { in: internal/markdown }
  filter:           { in: internal/filter }
  pattern:          { in: internal/pattern }
  search:           { in: internal/search }
  bleveindex:       { in: internal/search/bleveindex }
  searchparser:     { in: internal/search/searchparser }
  store:            { in: internal/store }
  fsstore:          { in: internal/store/fsstore }
  memstore:         { in: internal/store/memstore }
  graphquerynaive:  { in: internal/store/graphquerynaive }
  pgstore:          { in: internal/store/pgstore }
  storeutil:        { in: internal/store/storeutil }

  # Project bootstrap utilities
  projectsetup:     { in: internal/projectsetup }

  # Infrastructure
  acl:              { in: internal/acl }
  affordances:      { in: internal/affordances }
  ai:               { in: internal/ai }
  audit:            { in: internal/audit }
  principal:        { in: internal/principal }
  secrets:          { in: internal/secrets }
  cache:            { in: internal/cache }
  config:           { in: internal/config }
  git:              { in: internal/git }
  output:           { in: internal/output }
  project:          { in: internal/project }
  state:            { in: internal/state }
  storage:          { in: internal/storage }

  # Shared utilities
  errors:           { in: internal/errors }
  htmlutil:         { in: internal/htmlutil }
  natsort:          { in: internal/natsort }

# -- Vendors --------------------------------------------------------------
vendors:
  bleve:       { in: github.com/blevesearch/bleve/** }
  kong:        { in: github.com/alecthomas/kong }
  glamour:     { in: github.com/charmbracelet/glamour }
  huh:         { in: github.com/charmbracelet/huh }
  yaml:        { in: gopkg.in/yaml.v3 }
  goldmark:
    in:
      - github.com/yuin/goldmark
      - github.com/yuin/goldmark/**
      - github.com/teekennedy/goldmark-markdown
      - github.com/mitchellh/go-wordwrap
  gogit:       { in: github.com/go-git/go-git/** }
  gopherlua:   { in: [github.com/yuin/gopher-lua, github.com/yuin/gopher-lua/**] }
  runewidth:   { in: github.com/mattn/go-runewidth }
  rrulego:     { in: github.com/teambition/rrule-go }
  mcpgo:       { in: github.com/mark3labs/mcp-go/** }
  wails:       { in: github.com/wailsapp/wails/** }
  tablewriter:
    in:
      - github.com/olekukonko/tablewriter
      - github.com/olekukonko/tablewriter/**
  color:       { in: github.com/fatih/color }
  fsnotify:    { in: github.com/fsnotify/fsnotify }
  pgx:         { in: github.com/jackc/pgx/** }
  singleflight: { in: golang.org/x/sync/singleflight }
  http2:
    in:
      - golang.org/x/net/http2
      - golang.org/x/net/http2/**

# -- Common (importable by all) -------------------------------------------
commonComponents:
  - entity
  - errors
  - natsort

commonVendors:
  - yaml

# -- Dependency rules ------------------------------------------------------
deps:
  # Entry points
  cmdCli:
    mayDependOn:
      - cli
  cmdServer:
    mayDependOn:
      - acl
      - appbuild
      - audit
      - dataentry
      - principal
      - scheduler
      - script
    canUse:
      - http2
  cmdDesktop:
    mayDependOn:
      - appbuild
      - audit
      - dataentry
      - desktop
      - git
      - metamodel
      - principal
      - project
      - scheduler
      - script
      - storage
    canUse:
      - wails

  # CLI layer — orchestrates everything. memstore is here because
  # cli/mcp_wiring has its own per-build store seam (the FS variant
  # uses app+bleveindex, the -tags memorybackend variant uses
  # memstore). Union over build tags, same rationale as appbuild.
  cli:
    mayDependOn:
      - acl
      - ai
      - analysis
      - app
      - appbuild
      - attachment
      - audit
      - autocascade
      - automation
      - bleveindex
      - config
      - dataentryconfig
      - entitymanager
      - filter
      - importer
      - lua
      - markdown
      - mcp
      - memstore
      - metamodel
      - output
      - pgstore
      - principal
      - project
      - projectsetup
      - rename
      - renametype
      - scheduler
      - schema
      - script
      - search
      - state
      - storage
      - store
      - templating
      - tracer
      - validator
    canUse:
      - kong
      - color
      - glamour
      - huh
      - tablewriter

  # Web / UI layer
  dataentry:
    mayDependOn:
      - acl
      - affordances
      - audit
      - config
      - conflict
      - dataentryconfig
      - entitymanager
      - filter
      - principal
      - git
      - htmlutil
      - lua
      - metamodel
      - migration
      - openapi
      - project
      - script
      - search
      - searchparser
      - state
      - storage
      - store
      - templating
      - tracer
      - validator
    canUse:
      - goldmark
      - gogit
      - singleflight
  dataentryconfig:
    mayDependOn:
      - git
      - metamodel
  desktop:
    canUse:
      - wails

  # Server protocols
  #
  # mcp takes a focused mcp.Deps struct (domain types only) from the
  # cli wiring site; it holds no composition-root aggregate, so
  # appbuild is deliberately absent from this whitelist. The project
  # context no longer leaks in either — mcp.Deps carries ProjectRoot
  # as a plain string rather than a *project.Context.
  mcp:
    mayDependOn:
      - ai
      - audit
      - config
      - dataentryconfig
      - entitymanager
      - filter
      - principal
      - lua
      - metamodel
      - rename
      - schema
      - script
      - search
      - store
      - tracer
      - validator
    canUse:
      - mcpgo
      - fsnotify
  openapi:
    mayDependOn:
      - metamodel

  # Application services
  app:
    mayDependOn:
      - fsstore
      - metamodel
      - project
      - storage
      - store
  # appbuild deps are the union across build tags. Default build
  # (!postgres && !memorybackend) imports app + bleveindex via the
  # FS seam files; -tags memorybackend imports memstore via its
  # alternative seam. arch-lint sees the whole graph reachable under
  # any tag, so both backends' deps must be allow-listed here.
  appbuild:
    mayDependOn:
      - acl
      - app
      - audit
      - autocascade
      - automation
      - bleveindex
      - config
      - entitymanager
      - lua
      - memstore
      - metamodel
      - pgstore
      - project
      - script
      - search
      - state
      - storage
      - store
      - templating
      - tracer
      - validator
  appbuildtest:
    mayDependOn:
      - acl
      - appbuild
      - audit
      - autocascade
      - automation
      - bleveindex
      - config
      - entity
      - entitymanager
      - lua
      - memstore
      - metamodel
      - project
      - script
      - search
      - state
      - storage
      - store
      - templating
      - tracer
      - validator
  projectsetup:
    mayDependOn:
      - dataentryconfig
      - metamodel
      - migration
      - project
      - storage

  # Domain services
  analysis:
    mayDependOn:
      - lua
      - metamodel
      - project
      - schema
      - storage
      - store
      - tracer
      - validation
  attachment:
    mayDependOn:
      - entitymanager
      - metamodel
      - store
  acl:
    mayDependOn:
      - entity
      - principal
      - store
  affordances:
    mayDependOn:
      - acl
      - entity
      - metamodel
      - predicate
      - principal
  audit:
    mayDependOn:
      - principal
  renametype:
    mayDependOn:
      - metamodel
      - project
      - storage
  autocascade:
    mayDependOn:
      - audit
      - automation
  automation:
    mayDependOn:
      - filter
      - metamodel
  conflict:
    mayDependOn:
      - markdown
      - metamodel
      - project
  entitymanager:
    mayDependOn:
      - acl
      - audit
      - autocascade
      - automation
      - metamodel
      - principal
      - rename
      - store
      - templating
  importer:
    mayDependOn:
      - metamodel
      - storage
      - store
      - storeutil
  rename:
    mayDependOn:
      - store
  schema:
    mayDependOn:
      - dataentryconfig
      - metamodel
      - migration
      - store
  templating:
    mayDependOn:
      - markdown
      - metamodel
      - project
      - storage
    canUse:
      - goldmark
  predicate:
    mayDependOn: []
    canUse:
      - gopherlua
  tracer:
    mayDependOn:
      - store
  validation:
    mayDependOn:
      - filter
      - lua
      - markdown
      - metamodel
    canUse:
      - gopherlua
  validator:
    mayDependOn:
      - lua
      - metamodel
      - store
      - validation

  # Core domain
  metamodel:
    mayDependOn:
      - migration
      - storage
    canUse:
      - rrulego
  migration:
    mayDependOn:
      - storage
  markdown:
    canUse:
      - goldmark
  filter:
    mayDependOn:
      - metamodel
      - pattern
  lua:
    mayDependOn:
      - ai
      - filter
      - metamodel
      - search
      - secrets
      - store
      - tracer
    canUse:
      - goldmark
      - gopherlua
      - runewidth
      - rrulego
  scheduler:
    mayDependOn:
      - audit
      - config
      - lua
      - metamodel
      - principal
      - project
      - script
      - state
  script:
    mayDependOn:
      - ai
      - autocascade
      - lua
      - metamodel
      - project
  search:
    mayDependOn:
      - filter
      - store
    canUse:
      - bleve
  bleveindex:
    mayDependOn:
      - search
      - store
    canUse:
      - bleve
  searchparser:
    mayDependOn:
      - filter
  store:
    mayDependOn:
      - metamodel
  fsstore:
    mayDependOn:
      - cache
      - graphquerynaive
      - storage
      - store
      - storeutil
    canUse:
      - goldmark
  memstore:
    mayDependOn:
      - graphquerynaive
      - store
      - storeutil
  graphquerynaive:
    mayDependOn:
      - entity
      - store
  pgstore:
    mayDependOn:
      - graphquerynaive
      - search
      - store
      - storeutil
    canUse:
      - pgx
  storeutil:
    mayDependOn:
      - store

  # Infrastructure
  # ai: pure leaf — only stdlib (net/http, log/slog, encoding/json) plus
  # yaml (already in commonVendors). The Provider interface is consumed
  # by lua, script, cli, and mcp. No mayDependOn/canUse entry needed
  # because the component is component-only with no internal deps.
  # cache: pure in-memory utility, no internal deps
  config:
    mayDependOn:
      - storage
  git:
    canUse:
      - gogit
  output:
    mayDependOn:
      - tracer
    canUse:
      - color
      - tablewriter
  project:
    mayDependOn:
      - storage
  state:
    mayDependOn:
      - storage
  storage:
    anyProjectDeps: true
    canUse:
      - fsnotify
