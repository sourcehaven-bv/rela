version: 3

allow:
  depOnAnyVendor: false
  deepScan: false

exclude:
  - internal/testutil

excludeFiles:
  - "_test\\.go$"

# -- Components ----------------------------------------------------------
components:
  # Entry points
  cmdCli:           { in: cmd/rela }
  cmdServer:        { in: cmd/rela-server }
  cmdDesktop:       { in: cmd/rela-desktop }

  # CLI layer
  cli:              { in: internal/cli }

  # Web / UI layer
  dataentry:        { in: internal/dataentry }
  dataentryconfig:  { in: internal/dataentryconfig }
  desktop:          { in: internal/desktop }

  # Server protocols
  mcp:              { in: internal/mcp }

  # Application services
  workspace:        { in: internal/workspace }

  # Domain services
  automation:       { in: internal/automation }
  conflict:         { in: internal/conflict }
  importer:         { in: internal/importer }
  rename:           { in: internal/rename }
  repository:       { in: internal/repository }
  schema:           { in: internal/schema }
  validation:       { in: internal/validation }
  views:            { in: internal/views }

  # Core domain
  graph:            { in: internal/graph }
  lua:              { in: internal/lua }
  metamodel:        { in: internal/metamodel }
  migration:        { in: internal/migration }
  model:            { in: internal/model }
  markdown:         { in: internal/markdown }
  filter:           { in: internal/filter }
  pattern:          { in: internal/pattern }
  search:           { in: internal/search/** }

  # Infrastructure
  attachment:       { in: internal/attachment }
  git:              { in: internal/git }
  output:           { in: internal/output }
  project:          { in: internal/project }
  storage:          { in: internal/storage }

  # Shared utilities
  errors:           { in: internal/errors }
  htmlutil:         { in: internal/htmlutil }
  natsort:          { in: internal/natsort }

# -- Vendors --------------------------------------------------------------
vendors:
  bleve:       { in: github.com/blevesearch/bleve/** }
  cobra:       { in: github.com/spf13/cobra }
  yaml:        { in: gopkg.in/yaml.v3 }
  goldmark:
    in:
      - github.com/yuin/goldmark
      - github.com/yuin/goldmark/**
      - github.com/teekennedy/goldmark-markdown
      - github.com/mitchellh/go-wordwrap
  gogit:       { in: github.com/go-git/go-git/** }
  gopherlua:   { in: github.com/yuin/gopher-lua }
  mcpgo:       { in: github.com/mark3labs/mcp-go/** }
  wails:       { in: github.com/wailsapp/wails/** }
  tablewriter: { in: github.com/olekukonko/tablewriter }
  color:       { in: github.com/fatih/color }
  fsnotify:    { in: github.com/fsnotify/fsnotify }
  singleflight: { in: golang.org/x/sync/singleflight }

# -- Common (importable by all) -------------------------------------------
commonComponents:
  - model
  - errors
  - natsort

commonVendors:
  - yaml

# -- Dependency rules ------------------------------------------------------
deps:
  # Entry points
  cmdCli:
    mayDependOn:
      - cli
  cmdServer:
    mayDependOn:
      - dataentry
      - project
      - repository
      - storage
      - workspace
  cmdDesktop:
    mayDependOn:
      - dataentry
      - desktop
      - git
      - metamodel
      - project
      - repository
      - storage
      - workspace
    canUse:
      - wails
  # CLI layer — orchestrates everything
  cli:
    mayDependOn:
      - dataentryconfig
      - filter
      - importer
      - lua
      - markdown
      - mcp
      - metamodel
      - output
      - project
      - schema
      - views
      - workspace
    canUse:
      - cobra
      - color
      - tablewriter

  # Web / UI layer
  dataentry:
    mayDependOn:
      - conflict
      - dataentryconfig
      - filter
      - git
      - graph
      - htmlutil
      - markdown
      - metamodel
      - migration
      - project
      - search
      - workspace
    canUse:
      - goldmark
      - gogit
  dataentryconfig:
    mayDependOn:
      - git
      - metamodel
  desktop:
    canUse:
      - wails

  # Server protocols
  mcp:
    mayDependOn:
      - dataentryconfig
      - filter
      - lua
      - markdown
      - metamodel
      - rename
      - schema
      - search
      - views
      - workspace
    canUse:
      - mcpgo
      - fsnotify

  # Application services
  workspace:
    mayDependOn:
      - attachment
      - automation
      - dataentryconfig
      - graph
      - htmlutil
      - markdown
      - metamodel
      - migration
      - project
      - rename
      - repository
      - search
      - storage
      - validation
      - views
    canUse:
      - goldmark
      - singleflight

  # Domain services
  automation:
    mayDependOn:
      - filter
      - metamodel
  conflict:
    mayDependOn:
      - markdown
      - metamodel
      - project
      - storage
  importer:
    mayDependOn:
      - graph
      - metamodel
      - repository
      - storage
  rename:
    mayDependOn:
      - graph
      - metamodel
      - project
      - repository
  repository:
    mayDependOn:
      - graph
      - markdown
      - metamodel
      - migration
      - project
      - storage
      - views
    canUse:
      - gogit
  schema:
    mayDependOn:
      - dataentryconfig
      - graph
      - metamodel
      - migration
      - views
  validation:
    mayDependOn:
      - filter
      - markdown
      - metamodel
  views:
    mayDependOn:
      - filter
      - graph
      - metamodel
      - storage

  # Core domain
  metamodel:
    mayDependOn:
      - storage
  migration:
    mayDependOn:
      - storage
  markdown:
    mayDependOn:
      - metamodel
      - storage
    canUse:
      - goldmark
  filter:
    mayDependOn:
      - metamodel
      - pattern
  lua:
    mayDependOn:
      - filter
      - metamodel
      - workspace
    canUse:
      - goldmark
      - gopherlua
  search:
    mayDependOn:
      - filter
    canUse:
      - bleve

  # Infrastructure
  attachment:
    mayDependOn:
      - storage
  git:
    canUse:
      - gogit
  output:
    canUse:
      - color
      - tablewriter
  project:
    mayDependOn:
      - storage
  storage:
    anyProjectDeps: true
    canUse:
      - fsnotify
