version: "1.0"
types:
  ticket_status:
    values: [open, in-progress, resolved, closed]
    default: open
  priority:
    values: [critical, high, medium, low]
    default: medium
entities:
  ticket:
    label: Ticket
    id_prefix: "TKT-"
    id_type: sequential
    properties:
      title:
        type: string
        required: true
      description:
        type: string
      status:
        type: ticket_status
        required: true
      priority:
        type: priority
        required: true
      assignee:
        type: string
      reporter:
        type: string
        required: true
      due_date:
        type: date
      estimated_hours:
        type: integer
      is_blocked:
        type: boolean
  category:
    label: Category
    plural: categories
    id_prefix: "CAT-"
    id_type: sequential
    properties:
      name:
        type: string
        required: true
      description:
        type: string
      color:
        type: string
  label:
    label: Label
    id_prefix: "LBL-"
    id_type: sequential
    properties:
      name:
        type: string
        required: true
relations:
  belongs-to:
    label: belongs to
    from: [ticket]
    to: [category]
    inverse: contains
  tagged:
    label: tagged
    from: [ticket]
    to: [label]
    inverse: appliedTo
    properties:
      added_by:
        type: string
        description: Who added this tag
      added_date:
        type: date
        description: When the tag was added
  blocks:
    label: blocks
    from: [ticket]
    to: [ticket]
    inverse: blockedBy
    properties:
      reason:
        type: string
        required: true
        description: Why this ticket blocks the other
      severity:
        type: enum
        values: [critical, high, medium, low]
        default: medium
      resolved_date:
        type: date
        description: When the blocker was resolved
      impact_score:
        type: integer
        description: Impact score from 1-10
      is_workaround_available:
        type: boolean
        description: Whether a workaround exists
